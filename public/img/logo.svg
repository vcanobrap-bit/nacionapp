<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Escudo / Shield -->
  <path
    d="M50 4 L94 22 L94 72 Q94 106 50 118 Q6 106 6 72 L6 22 Z"
    fill="rgba(14,21,42,0.8)"
    stroke="rgba(56,189,248,0.35)"
    stroke-width="1.5"
  />

  <!-- Franja celeste superior -->
  <clipPath id="s">
    <path d="M50 4 L94 22 L94 72 Q94 106 50 118 Q6 106 6 72 L6 22 Z"/>
  </clipPath>
  <g clip-path="url(#s)">
    <rect x="0"  y="0"  width="100" height="36" fill="rgba(56,189,248,0.22)"/>
    <rect x="0"  y="36" width="100" height="22" fill="rgba(255,255,255,0.06)"/>
    <rect x="0"  y="58" width="100" height="62" fill="rgba(56,189,248,0.22)"/>
  </g>

  <!-- Texto SAF -->
  <text
    x="50" y="57"
    text-anchor="middle"
    fill="rgba(148,218,255,0.85)"
    font-family="system-ui, sans-serif"
    font-size="18"
    font-weight="900"
    letter-spacing="3"
  >SAF</text>

  <!-- Subtexto -->
  <text
    x="50" y="72"
    text-anchor="middle"
    fill="rgba(148,218,255,0.45)"
    font-family="system-ui, sans-serif"
    font-size="6.5"
    font-weight="600"
    letter-spacing="2"
  >ARGENTINA</text>

  <!-- Estrellita decorativa arriba -->
  <polygon
    points="50,12 51.8,17.5 57.5,17.5 52.8,21 54.6,26.5 50,23 45.4,26.5 47.2,21 42.5,17.5 48.2,17.5"
    fill="rgba(148,218,255,0.5)"
  />
</svg>
